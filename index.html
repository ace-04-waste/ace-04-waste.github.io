    <h2>06 20 06 26 1354 : building a harbour.</h2>

    <p>
       

“A ship in harbor is safe, but that is not what ships are built for." <a href = "https://en.wikiquote.org/wiki/John_Augustus_Shedd" target="_blank">john a. shedd<a/> (1928)<br>

        
2012<br>
Why did I build a harbour?<br>
What do you mean, harbour?<br>
It’s a metaphor - I built a sandbox for a family. <br>
It needed a place to be nurtured- so I built a harbour. <br>
I didn’t know that until I started a family. <br>
So why did you start a family?<br>
Honestly I’m not entirely sure - I liked a girl. <br>
Building the harbour became a necessity to solve the problems of starting a family. <br>
A harbours most important element is the breakwater. <br>
What’s a breakwater? <br>
It’s the wall between the raging ocean and the still water inside the harbour - the basin. <br>
It absorbs the raw kinetic violence of the ocean. <br>
Yeh - that’s me and I chose that role after I started a family. <br>
Sometimes it’s felt overwhelming. <br>
Sometimes I’ve had to eject boats so that the people it was built for are safe in the harbour and so I can be the breakwater effectively.<br>
Without the breakwater there is no amount of dredging and refuelling that can make up for a shoddy weak breakwater. <br>
The breakwater keeps everything inside it calm and safe from the outside. <br>
It’s absorbs everything! <br>
It sounds taxing and intimidating? Why be the breakwater ?<br>
As a man I believe it’s why you are here. <br>
You can focus all your masculine energy into yourself but my experience is you drift - get lazy - and miserable - without true purpose. <br>
I believe men are built for problem solving and building. <br>
Building ?<br>
Yeh creating order from chaos using creative problem solving. <br>
Having plans and blueprints and visions. <br>
Some days it’s petrifying but you get up and make a start and it becomes less daunting. <br>
Ok so you Build a harbour but they leave in the end. <br>
Your wife may leave so might your kids? <br>
Oh the kids will leave I want them too. <br>
There’s a huge deep ocean to explore.  <br>
But they have the co ordinates for the harbour and know they can dock whenever they need it. Ships are built to sail not to sit in a harbour. <br>
Your wife ? <br>
Yeh she might . <br>
But in this day and age . Would you leave a solid harbour master?<br>
However there are no guarantees the goalposts move and in the end it’s all tiddlywinks <br>
Tiddlywinks ? That’s a lot of effort if you think your wife leaving you is all tiddlywinks!<br>
You missed the point. <br>
I’m a man - a builder - a problem solver. <br>
I’m fulfilling my purpose. <br>
The process is what’s creating the brain chemistry. <br>
Not the end results.<br>
And it’s a Len’s that I look through to see the world.<br>
If the desks a mess  clean it up. <br>
If someone drops litter in front of me - no drama - but I’m picking it up. <br>
</a><mark>Order from chaos!</mark> <br>
But life never stays ordered ?<br>
Yes and it’s great that is doesn’t or I’d have no purpose for being here. <br>
Just one final thought money and fame and likes are recent bookmarks in our evolution they won’t tick the box you need it too.<br>
Go back to the whispering of your great great ancestors they wanted you to win. <br>
